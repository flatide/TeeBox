# ProperTee TeeBox deployment config
#
# All settings use the `propertee.teebox.*` prefix unless noted otherwise.
# System properties passed via JAVA_OPTS override values in this file.

# Bind address for the HTTP server.
propertee.teebox.bind=127.0.0.1

# TCP port for the HTTP server.
propertee.teebox.port=18080

# Required base directory for TeeBox runtime data.
# Stores runs/, tasks/, and script-registry/.
propertee.teebox.dataDir=/var/lib/teebox

# Maximum number of ProperTee runs processed concurrently.
# Default workload assumption is many short I/O-heavy runs.
propertee.teebox.maxRuns=64

# Optional fallback Bearer token for all API namespaces.
# Prefer namespace-specific tokens below for production.
# propertee.teebox.apiToken=change-me

# Optional Bearer token for /api/client/* routes.
# propertee.teebox.clientApiToken=change-client-token

# Optional Bearer token for /api/publisher/* routes.
# propertee.teebox.publisherApiToken=change-publisher-token

# Optional Bearer token for /api/admin/* routes.
# propertee.teebox.adminApiToken=change-admin-token

# Optional active run retention before runs are archived.
# Supported suffixes: ms, s, m, h, d. Raw numbers are treated as ms for backward compatibility.
# Default: 24h
# propertee.teebox.runRetentionMs=24h

# Optional archived run retention before runs are purged.
# Default: 7d
# propertee.teebox.runArchiveRetentionMs=7d

# Optional maintenance interval for archive/purge work.
# Default: 1m
# propertee.teebox.maintenanceIntervalMs=1m

# Optional task retention before tasks are archived.
# Note: task retention uses the `propertee.task.*` prefix.
# Default: 24h
# propertee.task.retentionMs=24h

# Optional archived task retention before tasks are purged.
# Default: 7d
# propertee.task.archiveRetentionMs=7d
