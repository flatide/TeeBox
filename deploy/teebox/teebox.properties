# ProperTee TeeBox deployment config

propertee.teebox.bind=127.0.0.1
propertee.teebox.port=18080
propertee.teebox.dataDir=/var/lib/teebox
propertee.teebox.maxRuns=4

# Optional legacy API token for all /api/* routes
# propertee.teebox.apiToken=change-me

# Optional namespace-specific API tokens
# propertee.teebox.clientApiToken=change-client-token
# propertee.teebox.publisherApiToken=change-publisher-token
# propertee.teebox.adminApiToken=change-admin-token

# Command safety guard (block, warn, off; default: block)
# propertee.teebox.commandGuard.mode=block
# propertee.teebox.commandGuard.extraPatterns=\\brm\\s+-rf\\s+/home
# propertee.teebox.commandGuard.patternsFile=/etc/teebox/guard-patterns.txt

# Optional retention tuning
# propertee.task.retentionMs=86400000
# propertee.task.archiveRetentionMs=604800000
# propertee.teebox.runRetentionMs=86400000
# propertee.teebox.runArchiveRetentionMs=604800000
